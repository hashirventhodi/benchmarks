services:
  pg:
    image: postgres:18-alpine
    container_name: bench-pg
    environment:
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
      POSTGRES_DB: bench
    ports:
      - "5544:5432"
    command:
      - "postgres"
      - "-c"
      - "max_connections=400"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "synchronous_commit=off"
      - "-c"
      - "fsync=off"
      - "-c"
      - "full_page_writes=off"
    tmpfs:
      - /var/lib/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "bench"]
      interval: 1s
      timeout: 1s
      retries: 30
